name: CI

on:
  push:
    branches: [master, js2264/*]
  pull_request:
    branches: [master, js2264/*]

permissions:
  contents: read

jobs:
  docker-build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t instagraal .

      - name: Check for NVIDIA GPU availability
        id: gpu
        run: |
          if command -v nvidia-smi >/dev/null 2>&1; then
            echo "has_gpu=true" >> $GITHUB_OUTPUT
          else
            echo "has_gpu=false" >> $GITHUB_OUTPUT
          fi

      - name: Check that instagraal is available in the container
        run: |
          docker run instagraal bash -c \
            "ls /usr/local/lib/python3.10/dist-packages/ | grep -i instagraal"

      - name: Run pytest (GPU tests auto-skipped when no GPU)
        # Mount the workspace so pytest can find pyproject.toml, tests/, and
        # example/ data.  GPU tests carry their own skip guard and are skipped
        # automatically on CPU-only runners.
        # --gpus all is added only when a GPU is present so the flag is never
        # passed to a runtime that doesn't support it.
        run: |
          GPU_FLAG=""
          if [ "${{ steps.gpu.outputs.has_gpu }}" = "true" ]; then
            GPU_FLAG="--gpus all"
          fi
          docker run $GPU_FLAG \
            -v ${{ github.workspace }}:/workspace \
            --workdir /workspace \
            instagraal \
            bash -c "
              uv pip install --system '/workspace[test]' && \
              pytest --junitxml=test-results.xml
            "

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results.xml

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage.xml
            htmlcov/

